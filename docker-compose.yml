services:
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: mihomo-sub-manager-server
    environment:
      DATABASE_URL: file:/app/data/app.db
      # 订阅管理后台的访问密钥，前端 /setup 需填同一个值；可自行改成任意字符串
      API_KEY: 735c73664f834be75baa367ffc3c613fe49d772c85f91c7c
      PORT: 3000
    volumes:
      - ./data:/app/data
    ports:
      - "${SERVER_PORT:-3000}:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: mihomo-sub-manager-web
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
