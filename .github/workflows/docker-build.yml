name: Build & push images

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  workflow_dispatch: # 支持手动触发

permissions:
  contents: read
  packages: write # 推送到 GHCR 需要

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # 一个失败不连带取消另一个，便于定位真实错误
      matrix:
        service: [server, web] # 同时构建两个镜像
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name (lowercase)
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/mihomo-sub-manager-${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
